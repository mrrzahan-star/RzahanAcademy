kind = "web"
previewPath = "/"
title = "Rzahan Academy"
version = "1.0.0"
id = "artifacts/rzahan-academy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25925

[services.development]
run = "pnpm --filter @workspace/rzahan-academy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rzahan-academy", "run", "build" ]
publicDir = "artifacts/rzahan-academy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25925"
BASE_PATH = "/"
