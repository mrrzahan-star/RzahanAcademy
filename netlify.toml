# ─────────────────────────────────────────────────────────────────────────────
#  Rzahan Academy — Netlify Configuration
#
#  Architecture:
#    Browser → Netlify CDN  (React SPA static files)
#    Browser → Netlify Functions  (/api/* → serverless Express handler)
#    Netlify Functions → Supabase PostgreSQL  (Drizzle ORM)
#
#  Deploy from GitHub: connect repo to Netlify, set env vars, deploy.
# ─────────────────────────────────────────────────────────────────────────────

[build]
  # Runs from repo root
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build:netlify && BASE_PATH=/ pnpm --filter @workspace/rzahan-academy run build"
  publish  = "artifacts/rzahan-academy/dist/public"

[build.environment]
  NODE_VERSION = "24"
  PNPM_VERSION = "10"
  # BASE_PATH is injected into the frontend build above via the command itself.
  # Do NOT set BASE_PATH here — it is only needed during the Vite build, not at runtime.

# ── Netlify Functions ─────────────────────────────────────────────────────────
[functions]
  directory    = "netlify/functions"
  node_bundler = "none"   # We pre-bundle with esbuild ourselves

# ── Redirects ─────────────────────────────────────────────────────────────────

# All /api/* requests → Netlify Function (pre-bundled Express handler)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

# SPA fallback — all other routes → React app
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers ───────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
